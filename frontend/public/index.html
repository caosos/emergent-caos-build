            <p style="font-size:18px;color:#555;margin:0 0 24px;">A personal AI workspace where Aria remembers across conversations.</p>
            <p>CAOS is a memory-centric AI workspace. Unlike conventional chat tools that forget every session, CAOS gives the assistant (Aria) a typed, governed long-term memory with full provenance — you can audit, confirm, reclassify, or forget anything she remembers about you.</p>
            <h2 style="font-size:22px;margin:32px 0 8px;">What's inside</h2>
            <ul>
              <li>Persistent long-term memory across all conversations, classified into 13 typed governance bins (Identity, Active Project, Governance Rule, Operating Preference, Domain Context, Technical State, Behavioral Pattern, Derived Trait, Learning Profile, Real-World Context, Risk Signal, Counterevidence, Relationship Boundary).</li>
              <li>Full provenance: every memory atom links back to the conversation where it was learned, plus the date and confidence score.</li>
              <li>Multi-engine routing: switch between OpenAI, Anthropic Claude, Google Gemini, and xAI Grok per turn.</li>
              <li>Live Working Context Window meter sized to the active engine's real token limit.</li>
              <li>Voice-first hands-free mode with Whisper STT and browser TTS.</li>
              <li>Encrypted per-user connector vault: Google Workspace (Gmail / Drive / Calendar), GitHub, MCP servers, Obsidian, Slack, Twilio, Telegram, Stripe billing.</li>
              <li>Token-based freemium tiers (Free / Pro / Pro+).</li>
            </ul>
            <h2 style="font-size:22px;margin:32px 0 8px;">JavaScript required</h2>
            <p>The interactive workspace requires JavaScript. Please enable it in your browser to sign in. For the canonical AI-readable description, see <a href="/llms.txt">/llms.txt</a>.</p>
